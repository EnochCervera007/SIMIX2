<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Cuenta - SoccerPro</title>
    <link rel="stylesheet" href="MiCuenta.css">
</head>
<body>

<header>
    <h1>SoccerPro</h1>
</header>

<div class="container">
    <h2>Mi Cuenta</h2>

    <div class="tabs">
        <div class="tab active" onclick="openTab('login')">Iniciar Sesión</div>
        <div class="tab" onclick="openTab('perfil')">Crear Cuenta</div> 
    </div>

    <div id="login" class="tab-content active">
    <form id="loginForm">
        <label for="email">Correo Electrónico:</label>
        <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required>

        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password" placeholder="********" required>

        <button type="submit">Iniciar Sesión</button>
        <p id="loginMessage" style="color:red; margin-top:10px;"></p>
    </form>
</div>

    <div id="perfil" class="tab-content">
        <div class="user-info">
            <p><strong>Nombre:</strong> Juan Pérez</p>
            <p><strong>Email:</strong> juanperez@example.com</p>
            <p><strong>Miembro desde:</strong> Enero 2023</p>
            <button>Editar Perfil</button>
        </div>
    </div>
</div>

<script>
 
    const loginForm = document.getElementById('loginForm');
    const loginMessage = document.getElementById('loginMessage');

    loginForm.addEventListener('submit', function(event) {
        event.preventDefault(); // Evita recargar la página

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        // Usuario de prueba
        const user = {
            email: "juanperez@example.com",
            password: "123456"
        };

        if(email === user.email && password === user.password) {
            loginMessage.style.color = "green";
            loginMessage.textContent = "¡Inicio de sesión exitoso!";
            // Abre la pestaña de perfil
            openTab('perfil');
        } else {
            loginMessage.style.color = "red";
            loginMessage.textContent = "Correo o contraseña incorrectos.";
        }
    });
</script>
<script>
    // Función para cambiar de pestaña
    function openTab(tabName) {
        const tabs = document.querySelectorAll('.tab');
        const contents = document.querySelectorAll('.tab-content');

        tabs.forEach(tab => tab.classList.remove('active'));
        contents.forEach(content => content.classList.remove('active'));

        document.querySelector(`.tab[onclick="openTab('${tabName}')"]`).classList.add('active');
        document.getElementById(tabName).classList.add('active');

        // Si abrimos perfil, actualizar contenido dinámicamente
        if(tabName === 'perfil') {
            showProfile();
        }
    }

    // Usuario de prueba
    let loggedUser = null;

    const loginForm = document.getElementById('loginForm');
    const loginMessage = document.getElementById('loginMessage');

    loginForm.addEventListener('submit', function(event) {
        event.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        // Datos de usuario de prueba
        const user = {
            name: "Juan Pérez",
            email: "juanperez@example.com",
            memberSince: "Enero 2023",
            password: "123456"
        };

        if(email === user.email && password === user.password) {
            loggedUser = user; // Guardamos el usuario
            loginMessage.style.color = "green";
            loginMessage.textContent = "¡Inicio de sesión exitoso!";
            openTab('perfil'); 
        } else {
            loginMessage.style.color = "red";
            loginMessage.textContent = "Correo o contraseña incorrectos.";
        }
    });

    
    function showProfile() {
        const userInfo = document.getElementById('userInfo');
        if(loggedUser) {
            userInfo.innerHTML = `
                <p><strong>Nombre:</strong> ${loggedUser.name}</p>
                <p><strong>Email:</strong> ${loggedUser.email}</p>
                <p><strong>Miembro desde:</strong> ${loggedUser.memberSince}</p>
                <button onclick="editProfile()">Editar Perfil</button>
            `;
        } else {
            userInfo.innerHTML = `<p>Debes iniciar sesión para ver tu perfil.</p>`;
        }
    }

    
    function editProfile() {
        alert("Función de edición de perfil aún no implementada.");
    }
</script>
</body>
</html>
